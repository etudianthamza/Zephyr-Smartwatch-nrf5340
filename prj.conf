# Configuration existante (LVGL, affichage, capteurs)
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_LOG=y
CONFIG_SHELL=y
CONFIG_LVGL=y
CONFIG_LV_Z_MEM_POOL_SIZE=32768
CONFIG_LV_Z_SHELL=y
CONFIG_LV_USE_MONKEY=y
CONFIG_LV_COLOR_DEPTH_32=y
CONFIG_ILI9341=y
CONFIG_DISPLAY=y
CONFIG_INPUT=y
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LV_USE_PERF_MONITOR=y
CONFIG_LV_FONT_MONTSERRAT_16=y
CONFIG_LV_FONT_MONTSERRAT_18=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_MONTSERRAT_12=y
CONFIG_LV_FONT_MONTSERRAT_10=y
CONFIG_LV_FONT_MONTSERRAT_32=y
CONFIG_LV_FONT_MONTSERRAT_22=y
CONFIG_LV_USE_FONT_COMPRESSED=y

# Capteurs I2C
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SENSOR_LOG_LEVEL_DBG=y
CONFIG_CBPRINTF_FP_SUPPORT=y
# Ajout des pilotes spécifiques si nécessaire (exemple)
CONFIG_HTS221=y          # pour le capteur d'humidité/température
CONFIG_LIS2MDL=y       # magnétomètre
CONFIG_LPS22HH=y       # pression
CONFIG_LSM6DS0=y       # accéléromètre/gyroscope

# Timers
CONFIG_NRFX_TIMER=y
CONFIG_COUNTER=y

# Logs
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_INPUT_LOG_LEVEL_INF=y
CONFIG_INPUT_LOG_LEVEL_DBG=y

# GPIO (pour boutons, etc.)
CONFIG_GPIO=y
CONFIG_STDOUT_CONSOLE=y

# ---------- Configuration BLE ajoutée ----------
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="MySmartWatch"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_ATT_PREPARE_COUNT=2
CONFIG_BT_L2CAP_TX_BUF_COUNT=8
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_BT_RX_STACK_SIZE=2048
CONFIG_BT_AUTO_PHY_UPDATE=n
CONFIG_BT_AUTO_DATA_LEN_UPDATE=n
CONFIG_BT_GATT_AUTO_RESUBSCRIBE=n
CONFIG_BT_USER_PHY_UPDATE=y
# -----------------------------------------------